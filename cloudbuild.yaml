# Deploy Archsari to Google Cloud Run (API + web).
#
# Prerequisites:
#   - Artifact Registry repo (default: ${_AR_REPO})
#   - Cloud SQL PostgreSQL instance (optional but recommended for production)
#   - Secret Manager secrets: openai-api-key, jwt-secret, google-client-secret
#   - Google OAuth client with redirect URI:
#       https://${_WEB_SERVICE}-${PROJECT_NUMBER}.${_REGION}.run.app/api/auth/google/callback
#     (exact URL is shown after first web deploy)
#
# Trigger example:
#   gcloud builds submit --config=cloudbuild.yaml \
#     --substitutions=_REGION=us-central1,_CLOUD_SQL_CONNECTION=project:region:instance

substitutions:
  _REGION: us-central1
  _AR_REPO: archsari
  _API_SERVICE: archsari-api
  _WEB_SERVICE: archsari-web
  _CLOUD_SQL_CONNECTION: ""
  # Set after first API deploy, e.g. https://archsari-api-xxxxx-uc.a.run.app
  _BACKEND_URL: ""

options:
  logging: CLOUD_LOGGING_ONLY

steps:
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_API_SERVICE}:$COMMIT_SHA
      - ./backend

  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_WEB_SERVICE}:$COMMIT_SHA
      - ./frontend

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_API_SERVICE}:$COMMIT_SHA
    waitFor: [build-api]

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_WEB_SERVICE}:$COMMIT_SHA
    waitFor: [build-web]

  - id: deploy-api
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_API_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_API_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --timeout=300
      - --set-secrets=OPENAI_API_KEY=openai-api-key:latest,JWT_SECRET=jwt-secret:latest,GOOGLE_CLIENT_SECRET=google-client-secret:latest
      # OAuth/cookies must use the *web* service URL (browser origin), not the API service URL.
      - --set-env-vars=^@^SESSION_COOKIE_SECURE=true@OPENAI_MODEL=gpt-4o-mini@FRONTEND_URL=https://${_WEB_SERVICE}-$PROJECT_NUMBER.${_REGION}.run.app@GOOGLE_REDIRECT_URI=https://${_WEB_SERVICE}-$PROJECT_NUMBER.${_REGION}.run.app/api/auth/google/callback@CORS_ALLOW_ORIGINS=https://${_WEB_SERVICE}-$PROJECT_NUMBER.${_REGION}.run.app
    waitFor: [push-api]

  - id: deploy-web
    name: gcr.io/google.com/cloudsdktool/cloud-sdk
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_WEB_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_WEB_SERVICE}:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8080
      - --memory=256Mi
      - --set-env-vars=BACKEND_URL=${_BACKEND_URL}
    waitFor: [push-web, deploy-api]

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_API_SERVICE}:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_WEB_SERVICE}:$COMMIT_SHA
