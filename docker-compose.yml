# Local development stack (not used for Cloud Run).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: archsari
      POSTGRES_PASSWORD: archsari
      POSTGRES_DB: architecture_planner
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U archsari -d architecture_planner"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8080"
    env_file:
      - ./backend/.env
    environment:
      PORT: 8080
      DATABASE_URL: postgresql+psycopg://archsari:archsari@db:5432/architecture_planner
      CORS_ALLOW_ORIGINS: http://localhost:8080,http://127.0.0.1:8080
      FRONTEND_URL: http://localhost:8080
      GOOGLE_REDIRECT_URI: http://localhost:8080/api/auth/google/callback
    volumes:
      - backend_data:/tmp/data
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      BACKEND_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  pgdata:
  backend_data:
